<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="cardClip">
      <rect x="8" y="4" width="48" height="56" rx="6" ry="6"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-15%" width="150%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#090C0B"/>

  <!-- Card with shadow -->
  <g filter="url(#shadow)">
    <!-- Light half (bottom-right) -->
    <g clip-path="url(#cardClip)">
      <rect x="8" y="4" width="48" height="56" rx="6" fill="#F5F0E8"/>
      <!-- Dark diagonal half (top-left) -->
      <polygon points="8,4 56,4 8,60" fill="#0C3526"/>
    </g>

    <!-- "SH" on dark half -->
    <text
      x="11" y="30"
      font-family="'Cinzel', Georgia, serif"
      font-weight="900"
      font-size="18"
      fill="#C9A84C"
      letter-spacing="-0.5"
    >SH</text>

    <!-- Spade on light half -->
    <text
      x="34" y="55"
      font-family="Arial, sans-serif"
      font-size="20"
      fill="#0C3526"
      text-anchor="middle"
    >♠</text>

    <!-- Diagonal gold line -->
    <line x1="8" y1="60" x2="56" y2="4" stroke="#C9A84C" stroke-width="1" opacity="0.5" clip-path="url(#cardClip)"/>

    <!-- Card border -->
    <rect x="8" y="4" width="48" height="56" rx="6" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
